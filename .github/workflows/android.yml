name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # שלב זה מזריק את ההגדרות למניעת קריסת KSP ישירות לקובץ ההגדרות
    - name: Force Headless Mode for KSP and Kotlin
      run: |
        echo "org.gradle.jvmargs=-Djava.awt.headless=true -Xmx4096m" >> gradle.properties
        echo "kotlin.daemon.jvmopts=-Djava.awt.headless=true" >> gradle.properties
        echo "ksp.incremental=false" >> gradle.properties

    # התוסף הרשמי של גראדל שמוריד גרסה נקייה ותקינה ועוקף את הקובץ הפגום
    # gradle-version מוגדר במפורש כדי לעקוף לחלוטין את gradlew (שאיבד את הרשאת ההרצה שלו ב-git)
    # שים לב: בגרסה החדשה של ה-action, השלב הזה רק "מכין" את גראדל - לא מריץ build
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.11.1

    # השלב שבפועל מריץ את ה-build, בנפרד מההכנה
    - name: Run Gradle Build
      run: gradle assembleDebug --stacktrace

    # מעלה את קובץ ה-APK שנוצר כ-artifact להורדה מעמוד ה-Actions
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SecureGuardMDM-debug-apk
        path: app/build/outputs/apk/debug/*.apk
