name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # שלב זה מזריק את ההגדרות למניעת קריסת KSP ישירות לקובץ ההגדרות
    - name: Force Headless Mode for KSP and Kotlin
      run: |
        echo "org.gradle.jvmargs=-Djava.awt.headless=true -Xmx4096m" >> gradle.properties
        echo "kotlin.daemon.jvmopts=-Djava.awt.headless=true" >> gradle.properties
        echo "ksp.incremental=false" >> gradle.properties

    # התוסף הרשמי של גראדל שמוריד גרסה נקייה ותקינה ועוקף את הקובץ הפגום
    - name: Setup and Run Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        arguments: assembleDebug --stacktrace
