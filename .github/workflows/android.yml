name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Repair Gradle Wrapper
      run: gradle wrapper

    - name: Force Headless Mode for KSP and Kotlin
      run: |
        echo "org.gradle.jvmargs=-Djava.awt.headless=true -Xmx4096m" >> gradle.properties
        echo "kotlin.daemon.jvmopts=-Djava.awt.headless=true" >> gradle.properties
        echo "ksp.incremental=false" >> gradle.properties

    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace
      env:
        JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
